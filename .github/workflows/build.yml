name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Gerekli Paketleri Kur
        run: |
          pip install flet pandas openpyxl
          pip install flet-build  # Mobil derleme için ek bileşen
      
      - name: Flutter SDK Kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: APK Derle
        # main.py dosyanızın en kök dizinde olduğunu varsayıyoruz
        run: flet build apk --project ozeldersasistani
        
      - name: APK Dosyasını Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: OzelDersAsistani-APK
          path: build/apk/**/*.apk
